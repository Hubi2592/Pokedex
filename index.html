<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="overlay.css">
    <script src="./db.js"></script>
    <script src="./api.js"></script>
    <script src="./template.js"></script>
    <script src="./script.js"></script>
     <title>POKEDEX</title>
</head>
<body>
<header>
    <div class="logo">
        <h1>POKEDEX</h1>
    </div>
    <div class="searchBar">
        <input type="text" placeholder="Search Pokémon...">
    </div>
</header>
<section class="mainContent">
    <h1>POKEDEX</h1>
    <p>Welcome to the POKEDX!</p>
    <div id="loadingScreen" class="loadingScreen hidden">
    <div class="spinner"></div>
    <img src="./assets/icons/pngaaa.com-5271546.png" alt="Pokeball Icon" class="pokeballIcon">
    <p>Loading...</p>
    </div>
    <div class="pokemonContainer" id="pokemonContainer"></div>

    <button id="loadMoreBtn" class="loadMoreBtn" onclick="loadNextPokemonBatch()">Load More</button>

    <div id="overlayPokemonDetails"
    class="overlayPokemonDetails hidden"
    onkeydown="handleKeyDown(event)"
    tabindex="-1"
    onclick="clickOutside(event)"></div> 

</section>

<footer>
    <p>&copy; 2024 POKEDEX. All rights reserved.</p>
</footer>
</body>
</html>
