<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/images/pokeCenter.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./style/card.css">
    <link rel="stylesheet" href="./style/overlay.css">
    <script src="./scripts/db.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
     <title>POKEDEX</title>
</head>
<body onload="init()">
<header>
    <div  class=" headerContent contentWrapper">
        <div class="logo"onclick="backToStart()">
            <img src="./assets/icons/pngaaa.com-5271546.png" alt="Header Icon" class="headerIcon">
            <h1>POKEDEX</h1>
        </div>
            <div class="searchBar" data-id="search-input">
            <input id="searchInput" type="text" placeholder="Search for Pokémon..." aria-label="Search Pokémon by name" onkeydown="if(event.key === 'Enter') searchPokemonByName()">
            <button data-id="search-button" id="searchBtn" class="searchBtn" aria-label="Start Search Button" onclick="searchPokemonByName()">Search</button>
        </div>
    </div>
</header>
<main data-id ="content" class="contentWrapper">
    <section class="mainContent">
        <div class="title">
            <h1>WELCOME TO THE POKEDEX</h1>
            <img src="./assets/images/pokeCenter.png" alt="Pokecenter Icon" class="pokeCenterImage">
        </div>
        <div id="loadingScreen" class="loadingScreen hidden">
            <div class="spinner">
                <img src="./assets/icons/pngaaa.com-5271546.png" alt="Pokeball Icon" class="pokeballIcon">
            </div>    
                <p>Loading...</p>
        </div>
        <ol id="pokemonContainer" class="pokemonContainer"></ol>
        <button data-id="load-more-button" id="loadMoreBtn" class="loadMoreBtn button" aria-label="Load more Pokémon" onclick="loadNextPokemonBatch()">Load More</button>
        <button id="backToStartBtn" class="backToStartBtn button hidden" onclick="backToStart()">Back to Start</button>
    </section>

    <section data-id="dialog" id="overlayPokemonDetails"
    class="overlayPokemonDetails hidden"
    onkeydown="handleKeyDown(event)"
    tabindex="-1"
    onclick="clickOutside(event)">
    </sections> 
</main>

<footer>
    <p>&copy; 2024 POKEDEX. All rights reserved.</p>
</footer>
</body>
</html>
